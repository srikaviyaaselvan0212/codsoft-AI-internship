<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f0f0f0;
        }

        .chat-container{
            width:400px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            overflow:hidden;
        }

        .header{
            background:#007bff;
            color:white;
            text-align:center;
            padding:15px;
            font-size:20px;
        }

        .chat-box{
            height:400px;
            overflow-y:auto;
            padding:10px;
        }

        .user{
            text-align:right;
            margin:10px;
            color:blue;
        }

        .bot{
            text-align:left;
            margin:10px;
            color:green;
        }

        .input-area{
            display:flex;
        }

        input{
            flex:1;
            padding:10px;
        }

        button{
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">AI Chatbot</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {

    let input = document.getElementById("userInput");
    let message = input.value.toLowerCase().trim();

    if(message === "") return;

    let chatBox = document.getElementById("chatBox");

    chatBox.innerHTML +=
        `<div class="user"><b>You:</b> ${message}</div>`;

    let reply = "Sorry, I don't understand.";

    if(message.includes("hello") || message.includes("hi")){
        reply = "Hello! How can I help you?";
    }
    else if(message.includes("how are you")){
        reply = "I am fine. Thank you!";
    }
    else if(message.includes("What is AI")){
        reply = " AI is a human Intelligence.";
    }
    else if(message.includes("bye")){
        reply = "Goodbye! Have a nice day.";
    }
    else if(message.includes("time")){
        reply = "Current Time: " + new Date().toLocaleTimeString();
    }
    else if(message.includes("date")){
        reply = "Today's Date: " + new Date().toLocaleDateString();
    }

    setTimeout(() => {
        chatBox.innerHTML +=
            `<div class="bot"><b>Bot:</b> ${reply}</div>`;

        chatBox.scrollTop = chatBox.scrollHeight;
    }, 500);

    input.value = "";
}

document.getElementById("userInput").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
